services:

  backend:
    build: ./backend
    container_name: insightsql_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    container_name: insightsql_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  postgres:
    image: postgres:16
    container_name: insightsql_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightsql
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: insightsql_redis
    ports:
      - "6379:6379"
